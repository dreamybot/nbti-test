<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>职场修炼指南 — AI 多Agent求职系统</title>
  <meta name="theme-color" content="#0F1117">
  <meta name="description" content="AI 多Agent求职辅助系统 — 简历优化 · 模拟面试 · 岗位情报分析">
  <link rel="stylesheet" href="css/guide.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- ===== 导航 ===== -->
    <nav class="guide-nav">
      <a href="guide-landing.html" class="nav-back">← 返回首页</a>
      <span class="nav-title">职场修炼指南</span>
      <div class="nav-actions"></div>
    </nav>

    <!-- ===== Step 1: 人格概览 ===== -->
    <section class="step" id="step-profile">
      <div class="profile-card">
        <div class="profile-emoji" id="profile-emoji">🧬</div>
        <div class="profile-code" id="profile-code">--</div>
        <div class="profile-name" id="profile-name">--</div>
        <div class="profile-tagline" id="profile-tagline">--</div>
      </div>
      <div class="empty-state" style="margin-top:24px;">
        <p style="margin-bottom:16px;">完善信息后开启定制修炼方案</p>
        <button class="btn-primary" onclick="nextStep('profile','info')">开始定制 →</button>
      </div>
    </section>

    <!-- ===== Step 2: 信息收集 ===== -->
    <section class="step" id="step-info" style="display:none;">
      <div class="empty-state">
        <div class="icon">📋</div>
        <h3>完善你的信息</h3>
        <p style="margin-bottom:20px;">AI Agent 系统将根据这些信息为你生成定制方案</p>
      </div>

      <div class="form-group">
        <label>🎓 专业</label>
        <input type="text" class="form-input" id="info-major" placeholder="如：计算机科学 / 市场营销" maxlength="30">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label>📚 最高学历</label>
          <select class="form-input" id="info-education">
            <option value="college">大专</option>
            <option value="bachelor" selected>本科</option>
            <option value="master">硕士</option>
            <option value="phd">博士</option>
          </select>
        </div>
        <div class="form-group">
          <label>💼 工作经验</label>
          <select class="form-input" id="info-experience">
            <option value="0">应届生</option>
            <option value="1-3">1-3 年</option>
            <option value="3-5">3-5 年</option>
            <option value="5+">5 年以上</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>🎯 目标岗位</label>
        <input type="text" class="form-input" id="info-job" placeholder="如：产品经理 / 数据分析 / 运营" maxlength="30">
      </div>
      <div class="form-group">
        <label>📋 目标岗位招聘要求 (JD)</label>
        <textarea class="form-input" id="info-jd" rows="4" placeholder="粘贴目标岗位的招聘要求，Agent 将基于此进行精准分析…" style="min-height:80px;"></textarea>
      </div>

      <button class="btn-primary" onclick="submitUserInfo()" style="margin-top:4px;width:100%;">
        确认，进入 Agent 系统 →
      </button>
    </section>

    <!-- ===== Step 3: Agent 面板 ===== -->
    <section class="step" id="step-agents" style="display:none;">
      <div class="empty-state" style="margin-bottom:20px;">
        <p style="font-size:0.85rem;">已接入 <strong id="agent-status-name">--</strong> · 选择你要开启的 Agent</p>
      </div>

      <div class="agent-grid">
        <div class="agent-card" onclick="openAgent('resume')">
          <div class="agent-icon">📄</div>
          <div class="agent-info">
            <div class="agent-name">简历优化Agent</div>
            <div class="agent-desc">AI 根据目标岗位 JD 分析你的简历并给出优化建议</div>
          </div>
          <span class="agent-arrow">→</span>
        </div>
        <div class="agent-card" onclick="openAgent('interview')">
          <div class="agent-icon">🎤</div>
          <div class="agent-info">
            <div class="agent-name">模拟面试Agent</div>
            <div class="agent-desc">AI 生成面试题 + 智能评分反馈</div>
          </div>
          <span class="agent-arrow">→</span>
        </div>
        <div class="agent-card" onclick="openAgent('jobs')">
          <div class="agent-icon">🔍</div>
          <div class="agent-info">
            <div class="agent-name">岗位情报Agent</div>
            <div class="agent-desc">AI 分析目标岗位能力要求和发展路径</div>
          </div>
          <span class="agent-arrow">→</span>
        </div>
      </div>

      <!-- 工作区 -->
      <div class="agent-workspace" id="agent-workspace" style="display:none;">
        <div class="workspace-header">
          <span class="workspace-title" id="workspace-title">--</span>
          <div>
            <button class="btn-icon" onclick="exportResults()" title="导出结果">📥</button>
            <button class="btn-icon" onclick="closeAgent()" title="关闭">✕</button>
          </div>
        </div>
        <div class="workspace-body" id="workspace-body"></div>
      </div>
    </section>
  </div>

  <script src="js/data.js"></script>
  <script src="js/guide.js"></script>
</body>
</html>
